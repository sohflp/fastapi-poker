<!DOCTYPE html>
<html>
<head>
    <title>Poker Night</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: radial-gradient(circle, #0b5d2a 0%, #06381a 100%);
            min-height: 100vh;
        }

        .table-card {
            background: rgba(0,0,0,0.65);
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 20px;
        }

        .chip-button {
            background: #b91c1c;
            border-radius: 999px;
            padding: 10px 20px;
            font-weight: bold;
        }

        .chip-button:hover {
            background: #991b1b;
        }

        .nav-link {
            color: #e5e7eb;
            margin-right: 20px;
        }

        .nav-link:hover {
            color: white;
        }
    </style>
</head>

<body class="text-gray-200">

<nav class="bg-black bg-opacity-70 p-4 shadow-lg">
    <div class="max-w-6xl mx-auto flex justify-between">

        <div class="font-bold text-xl">
            <a class="nav-link" href="/">♠ Poker Night</a>
        </div>

        <div>
            <a class="nav-link" href="/timer">Timer</a>
            <a class="nav-link" href="/stats">Stats</a>
            <a class="nav-link" href="/admin">Admin</a>
        </div>

    </div>
</nav>

<div class="max-w-6xl mx-auto mt-10">

{% block content %}

{% endblock %}

</div>

</body>
</html>
