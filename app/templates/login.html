{% extends "layout.html" %}

{% block content %}

<div class="flex justify-center">

<div class="table-card w-96">

<h1 class="text-2xl font-bold mb-6 text-center">
Admin Login
</h1>

{% if error %}
<div class="bg-red-900 text-red-200 p-2 rounded mb-4 text-center">
{{ error }}
</div>
{% endif %}

<form method="post" action="/login">

<label class="block mb-2">
Username
</label>

<input
name="username"
class="w-full bg-gray-900 p-2 rounded mb-4"
/>

<label class="block mb-2">
Password
</label>

<input
name="password"
type="password"
class="w-full bg-gray-900 p-2 rounded mb-6"
/>

<button
type="submit"
class="chip-button w-full"
>
Login
</button>

</form>

</div>

</div>

{% endblock %}
