{% extends "layout.html" %}

{% block content %}

<h1 class="text-2xl md:text-3xl font-bold mb-6 text-center">
    Player Performance
</h1>

<!-- PLAYERS EVOLUTION CHART -->
<div id="pokerChart"></div>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script>
    const chartData = {{performance | tojson}};

    const series = chartData.datasets
        .filter(ds => ds.data.some(v => v > 0))
        .map(ds => ({
            name: ds.label,
            data: ds.data,
            color: ds.borderColor
    }));

    const categories = chartData.labels;
</script>
<script src="static/js/performance.js"></script>

{% endblock %}
